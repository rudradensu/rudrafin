###################################################
# Two-container deployment for Actual Budget.
#
# Container 1 (actual-db):
#   A lightweight Alpine container that owns and
#   manages the SQLite database volume. Run
#   administrative tasks (backups, inspection) by
#   exec-ing into this container.
#
# Container 2 (actual-server):
#   The Actual Budget sync-server application.
#   It mounts the shared volume from actual-db
#   under /data so it can read/write the SQLite
#   files without caring about the host path.
#
# Usage:
#   docker compose -f docker-compose.split.yml up -d
#   docker compose -f docker-compose.split.yml down
###################################################

services:
  actual-db:
    image: alpine:3.22
    container_name: actual-db
    volumes:
      - actual-db-data:/data
    # Keep the container alive so other tools can
    # exec into it for backups or inspection.
    command: sh -c "mkdir -p /data/server-files /data/user-files && while true; do sleep 86400; done"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -d /data"]
      interval: 30s
      timeout: 5s
      retries: 3

  actual-server:
    image: actualbudget/actual-server:latest
    container_name: actual-server
    depends_on:
      actual-db:
        condition: service_healthy
    volumes:
      - actual-db-data:/data
    ports:
      # Access Actual Budget at http://localhost:5006
      - '5006:5006'
    #environment:
      # Uncomment any of the lines below to set configuration options.
      # - ACTUAL_HTTPS_KEY=/data/selfhost.key
      # - ACTUAL_HTTPS_CERT=/data/selfhost.crt
      # - ACTUAL_PORT=5006
      # - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
      # - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
      # - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
      # See all options at https://actualbudget.org/docs/config/
      # !! If you are not using any of these options, remove the 'environment:' tag entirely.
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'node build/src/scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  actual-db-data:
    driver: local
